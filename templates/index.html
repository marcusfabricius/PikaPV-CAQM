<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MeasureApp Web</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>MeasureApp</h1>
        <p id="statusText">Local measurement web interface</p>
      </div>
      <button class="ghost danger" id="stopButton" type="button">Stop</button>
    </header>

    <nav class="progress" aria-label="Progress">
      <span class="active" data-step-dot="1">1 Measurement</span>
      <span data-step-dot="2">2 Plots</span>
      <span data-step-dot="3">3 Results</span>
    </nav>

    <section class="screen active" id="screen1">
      <div class="mode-grid" id="modeGrid"></div>
      <div class="conditional" id="frequencyOptions"></div>
      <div class="conditional" id="acOptions"></div>
      <div class="actions">
        <button class="secondary" id="advancedButton" type="button">Advanced settings</button>
        <button class="primary" id="nextFromMode" type="button">Next</button>
      </div>
    </section>

    <section class="screen" id="screen2">
      <div class="panel-row">
        <label>
          Number of plots
          <select id="plotCount"></select>
        </label>
      </div>
      <div class="plot-configs" id="plotConfigs"></div>
      <div class="actions">
        <button class="secondary" id="backToMode" type="button">Back</button>
        <button class="primary" id="nextFromPlots" type="button">Next</button>
      </div>
    </section>

    <section class="screen wait" id="waitingScreen">
      <div class="spinner"></div>
      <h2>Waiting for measurement to complete...</h2>
      <p>The instruments continue in the background. Detailed logs stay in the terminal.</p>
    </section>

    <section class="screen" id="screen3">
      <div class="result-actions">
        <a class="button primary" href="/download/combined">Download combined CSV</a>
        <button class="secondary" id="backToPlots" type="button">Change plot settings</button>
        <button class="secondary" id="newRun" type="button">New measurement</button>
      </div>
      <div class="metadata" id="metadata"></div>
      <div class="plots" id="plots"></div>
    </section>
  </main>

  <dialog id="infoModal">
    <form method="dialog">
      <button class="icon close" aria-label="Close">x</button>
      <h2 id="infoTitle"></h2>
      <p id="infoBody"></p>
      <h3>Example plots</h3>
      <p id="infoPlots"></p>
      <h3>Available variables</h3>
      <code id="infoVars"></code>
    </form>
  </dialog>

  <dialog id="advancedModal">
    <form method="dialog" id="advancedForm">
      <button class="icon close" aria-label="Close">x</button>
      <h2>Advanced settings</h2>
      <div class="advanced-grid" id="advancedGrid"></div>
      <div class="upload-row">
        <input id="csvUpload" type="file" accept=".csv">
        <button class="secondary" id="uploadButton" type="button">Upload CSV</button>
      </div>
      <menu>
        <button class="primary" value="default">Done</button>
      </menu>
    </form>
  </dialog>

  <dialog id="liveModal">
    <form method="dialog">
      <button class="icon close" aria-label="Close">x</button>
      <h2>Live lock-in data</h2>
      <div class="live-values" id="liveValues"></div>
      <canvas id="liveCanvas" width="960" height="420"></canvas>
    </form>
  </dialog>

  <script>
    window.DEFAULT_SETTINGS = {{ default_settings | tojson }};
    window.DEFAULT_PLOTS = {{ default_plots | tojson }};
  </script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
